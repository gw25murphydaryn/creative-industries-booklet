<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Creative Industries Booklet</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

/* Login */
#login-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:100vh;
}

/* Booklet */
#booklet { display:none; padding:20px; }

.cover-page {
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
}

.task {
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-left:6px solid grey;
  border-radius:8px;
}

.task.complete { border-left:6px solid green; }
.task.progress { border-left:6px solid orange; }

.field {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

.rte-editor {
  border:1px solid #ccc;
  min-height:100px;
  padding:10px;
}

button {
  padding:10px 15px;
  margin-top:10px;
  cursor:pointer;
}

.progress-bar {
  height:20px;
  background:#ddd;
  margin-top:10px;
}

.progress-fill {
  height:100%;
  width:0%;
  background:green;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>Sign in</h2>
  <button id="google-login">Sign in with Google</button>
</div>

<!-- BOOKLET -->
<div id="booklet">

  <div class="cover-page">
    <h1>Creative Industries Booklet</h1>
    <button onclick="submitWork()">Submit Final Work</button>

    <h3 id="stats"></h3>
    <div class="progress-bar">
      <div id="progress" class="progress-fill"></div>
    </div>
  </div>

  <div id="tasks"></div>

</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyA3Wdt5ZCO6DJ4F_PNpc7Je9tgZbYNZfBM",
  authDomain: "creative-industries-booklet.firebaseapp.com",
  projectId: "creative-industries-booklet"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ================= LOGIN =================
document.getElementById("google-login").onclick = () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
};

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("booklet").style.display = "block";
    init(user.uid);
  }
});

// ================= TASKS =================
const TOTAL_TASKS = 12;
let uid = null;

function init(userId){
  uid = userId;
  renderTasks();
  loadFromFirestore();
  setInterval(saveToFirestore, 15000);
}

function renderTasks(){
  const container = document.getElementById("tasks");
  container.innerHTML = "";

  for(let i=0;i<TOTAL_TASKS;i++){
    const div = document.createElement("div");
    div.className = "task";
    div.innerHTML = `
      <h3>Task ${i+1}</h3>
      <input class="field" placeholder="Short answer">
      <div class="rte-editor" contenteditable="true"></div>
    `;
    container.appendChild(div);
  }

  document.querySelectorAll(".field, .rte-editor").forEach(el=>{
    el.addEventListener("input", ()=>{
      updateDashboard();
      saveToFirestore();
    });
  });
}

// ================= STATUS =================
function updateDashboard(){
  let complete = 0;

  document.querySelectorAll(".task").forEach(task=>{
    const input = task.querySelector(".field").value.trim();
    const text = task.querySelector(".rte-editor").innerText.trim();

    let status = "notstarted";

    if(input && text){
      status = "complete";
      complete++;
    } else if(input || text){
      status = "progress";
    }

    task.className = "task " + status;
  });

  const percent = Math.round((complete/TOTAL_TASKS)*100);

  document.getElementById("stats").innerText =
    `${complete}/${TOTAL_TASKS} completed (${percent}%)`;

  document.getElementById("progress").style.width = percent + "%";
}

// ================= COLLECT =================
function collectData(){
  const data = {};

  document.querySelectorAll(".task").forEach((task,i)=>{
    data[i] = {
      input: task.querySelector(".field").value,
      text: task.querySelector(".rte-editor").innerHTML
    };
  });

  return data;
}

// ================= SAVE =================
function saveToFirestore(){
  if(!uid) return;

  db.collection("users").doc(uid).set({
    work: collectData(),
    updated: new Date()
  }, {merge:true});
}

// ================= LOAD =================
function loadFromFirestore(){
  db.collection("users").doc(uid).get().then(doc=>{
    if(!doc.exists) return;

    const data = doc.data().work;
    if(!data) return;

    document.querySelectorAll(".task").forEach((task,i)=>{
      if(data[i]){
        task.querySelector(".field").value = data[i].input;
        task.querySelector(".rte-editor").innerHTML = data[i].text;
      }
    });

    updateDashboard();
  });
}

// ================= SUBMIT =================
function submitWork(){
  if(!confirm("Submit and lock work?")) return;

  db.collection("submissions").doc(uid).set({
    work: collectData(),
    submittedAt: new Date()
  });

  // lock
  document.querySelectorAll("input, .rte-editor").forEach(el=>{
    el.setAttribute("disabled", true);
    el.contentEditable = false;
  });

  alert("Work submitted!");
}

</script>

</body>
</html>
